<style>
  :root {
    /* ClearTax brand */
    --purple: #6938EF;
    --purple-deep: #4F1FCC;
    --purple-soft: #EFE9FF;
    --ink: #0E0B2C;          /* near-black navy used in headlines */
    --ink-soft: #2A2547;
    --muted: #6B6884;
    --paper: #FFFFFF;
    --card-shadow: 0 4px 24px rgba(105, 56, 239, 0.06), 0 1px 3px rgba(14, 11, 44, 0.04);
    --card-shadow-lg: 0 20px 60px -20px rgba(105, 56, 239, 0.15), 0 8px 24px rgba(14, 11, 44, 0.06);
    --rule: #E8E4F5;
    --success: #10B981;
    --max: 1240px;

    /* Brand gradient — lavender to peach */
    --bg-gradient:
      radial-gradient(ellipse at 0% 30%, #E9DDFF 0%, transparent 55%),
      radial-gradient(ellipse at 100% 70%, #FFD9CB 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, #FBE4DC 0%, transparent 60%),
      linear-gradient(180deg, #F4ECFF 0%, #FBE4DC 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    color: var(--ink);
    background: #FAF7FE;
    line-height: 1.6;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--purple); color: #fff; }

  /* ==================== GRADIENT WRAPPER ==================== */
  .gradient-bg {
    background: var(--bg-gradient);
    background-attachment: fixed;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .gradient-bg::before {
    content: '';
    position: absolute;
    top: 10%; right: 20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(105,56,239,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Decorative wireframe sphere behind hero (echoing the screenshot) */
  .deco-sphere {
    position: absolute;
    top: 80px; right: -100px;
    width: 700px; height: 700px;
    pointer-events: none;
    opacity: 0.4;
    z-index: 0;
  }
  @media (max-width: 960px) {
    .deco-sphere { display: none; }
  }

  /* ==================== NAV (pill style) ==================== */
  .nav-container {
    padding: 20px 24px 0;
    position: relative;
    z-index: 10;
  }
  nav.pill {
    max-width: 1320px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 12px 12px 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 30px rgba(105, 56, 239, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink);
    letter-spacing: -0.04em;
    text-decoration: none;
    display: flex; align-items: center;
  }
  .nav-mid {
    display: flex; gap: 32px; align-items: center;
    font-size: 15px; font-weight: 500;
  }
  .nav-mid .nav-link {
    color: var(--ink);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 10px 4px;
    transition: color 0.2s;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    font-size: inherit;
    font-weight: 500;
  }
  .nav-mid .nav-link:hover { color: var(--purple); }
  .nav-mid .caret { font-size: 10px; opacity: 0.6; transition: transform 0.2s; }

  /* Dropdown wrapper */
  .nav-item-drop {
    position: relative;
  }
  .nav-item-drop:hover > .nav-link .caret,
  .nav-item-drop:hover > .country-pill .caret { transform: rotate(180deg); }

  /* Mega menu */
  .mega {
    position: absolute;
    top: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: #fff;
    border-radius: 18px;
    padding: 16px;
    min-width: 280px;
    box-shadow: 0 24px 48px -12px rgba(14,11,44,0.18), 0 0 0 1px rgba(232,228,245,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.25s ease;
    z-index: 100;
  }
  .nav-item-drop:hover > .mega,
  .nav-item-drop:focus-within > .mega,
  .nav-item-drop.is-open > .mega {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  /* Bridge so hover doesn't drop */
  .mega::before {
    content: '';
    position: absolute;
    top: -14px; left: 0; right: 0; height: 14px;
  }

  .mega-link {
    display: block;
    padding: 12px 16px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--ink);
    transition: background 0.15s;
  }
  .mega-link:hover { background: var(--purple-soft); }
  .mega-link:hover .mega-link-title { color: var(--purple); }
  .mega-link.active { background: var(--purple-soft); }
  .mega-link.active .mega-link-title {
    color: var(--purple);
    font-weight: 700;
  }
  .mega-link.active .mega-link-title::after {
    content: ' •';
    color: var(--purple);
  }
  .mega-link-title {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    transition: color 0.15s;
  }
  .mega-link-sub {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  /* Variant: Platform with descriptions, slightly wider */
  .platform-mega { min-width: 320px; }

  /* Variant: Country menu — two columns */
  .country-mega {
    min-width: 340px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    left: auto;
    right: 0;
    transform: translateX(0) translateY(-8px);
  }
  .nav-item-drop:hover > .country-mega,
  .nav-item-drop:focus-within > .country-mega,
  .nav-item-drop.is-open > .country-mega {
    transform: translateX(0) translateY(0);
  }
  .country-col { display: flex; flex-direction: column; }

  /* Country pill becomes button-styled */
  .country-pill {
    background: #fff;
    border-radius: 100px;
    padding: 9px 16px 9px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(14,11,44,0.06);
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    transition: box-shadow 0.2s;
  }
  .country-pill:hover { box-shadow: 0 4px 14px rgba(105,56,239,0.15); }

  .nav-right { display: flex; gap: 12px; align-items: center; }
  .country-flag {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-block;
    position: relative;
    overflow: hidden;
    /* Philippine flag — blue top half, red bottom half, white triangle on hoist (left) */
    background: linear-gradient(180deg, #0038A8 0%, #0038A8 50%, #CE1126 50%, #CE1126 100%);
    border: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .country-flag::before {
    /* white triangle on the hoist side */
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 11px;
    background: #fff;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }
  .country-flag::after {
    /* tiny yellow sun in the center of the white triangle */
    content: '';
    position: absolute;
    left: 2.5px; top: 50%;
    width: 4px; height: 4px;
    background: #FCD116;
    border-radius: 50%;
    transform: translateY(-50%);
  }

  .nav-cta {
    background: var(--purple);
    color: #fff;
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(105,56,239,0.3);
  }
  .nav-cta:hover { background: var(--purple-deep); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(105,56,239,0.4); }
  .nav-cta .arrow {
    width: 22px; height: 22px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  /* ============ Hamburger button (mobile only) ============ */
  .nav-hamburger {
    display: none;
    width: 44px; height: 44px;
    background: #fff;
    border: none;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(14,11,44,0.08);
    cursor: pointer;
    padding: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .nav-hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.2s ease;
    transform-origin: center;
  }
  body.menu-open .nav-hamburger span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  body.menu-open .nav-hamburger span:nth-child(2) {
    opacity: 0;
  }
  body.menu-open .nav-hamburger span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* ============ Mobile slide-down menu ============ */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    z-index: 49;
    max-height: 100vh;
    overflow-y: auto;
    padding: 96px 20px 32px;
    transform: translateY(-100%);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 24px 48px rgba(14,11,44,0.15);
  }
  body.menu-open .mobile-menu {
    transform: translateY(0);
  }
  .mobile-menu-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mm-link, .mm-group > summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: #FBF9FF;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    list-style: none;
  }
  .mm-link:hover, .mm-group > summary:hover {
    background: var(--purple-soft);
    color: var(--purple);
  }
  .mm-group { background: transparent; }
  .mm-group > summary::-webkit-details-marker { display: none; }
  .mm-group .caret { transition: transform 0.2s; font-size: 12px; opacity: 0.5; }
  .mm-group[open] > summary { background: var(--purple-soft); color: var(--purple); border-radius: 12px 12px 0 0; }
  .mm-group[open] > summary .caret { transform: rotate(180deg); }
  .mm-sublink {
    display: block;
    padding: 12px 18px 12px 32px;
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    background: #FBF9FF;
    border-top: 1px solid #fff;
  }
  .mm-group > .mm-sublink:last-child { border-radius: 0 0 12px 12px; }
  .mm-sublink:hover { color: var(--purple); background: #F3EBFF; }
  .mm-country-row { display: inline-flex; align-items: center; gap: 10px; }
  .mm-cta {
    justify-content: center;
    margin-top: 16px;
    width: 100%;
  }

  /* ============ Mobile breakpoint ============ */
  @media (max-width: 960px) {
    .nav-mid { display: none; }
    .country-drop { display: none; }
    .nav-cta .nav-cta-label { display: none; }
    .nav-cta { padding: 12px; min-width: 44px; min-height: 44px; justify-content: center; }
    .nav-cta .arrow { background: transparent; }
    .nav-hamburger { display: flex; }
    .mobile-menu { display: block; }
    nav.pill { padding: 8px 8px 8px 18px; }
    .logo { font-size: 22px; }
  }
  @media (max-width: 480px) {
    .nav-container { padding: 12px 12px 0; }
    nav.pill { padding: 8px 8px 8px 16px; }
    .logo { font-size: 20px; }
  }

  /* Lock body scroll when menu is open */
  body.menu-open { overflow: hidden; }

  /* ==================== BREADCRUMBS ==================== */
  .breadcrumbs {
    max-width: var(--max); margin: 32px auto 0;
    padding: 0 24px;
    font-size: 13px; color: var(--muted);
    font-weight: 500;
    position: relative; z-index: 5;
  }
  .breadcrumbs a { color: var(--muted); text-decoration: none; }
  .breadcrumbs a:hover { color: var(--purple); }
  .breadcrumbs .sep { margin: 0 10px; opacity: 0.5; }

  /* ==================== HERO ==================== */
  .hero {
    max-width: var(--max);
    margin: 0 auto;
    padding: 48px 24px 64px;
    position: relative;
    z-index: 1;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }
  @media (max-width: 960px) {
    .hero { padding: 40px 20px 48px; }
    .hero-grid { grid-template-columns: 1fr; gap: 32px; }
  }
  @media (max-width: 480px) {
    .hero { padding: 28px 16px 40px; }
    .hero-grid { gap: 24px; }
  }

  .eyebrow {
    display: inline-block;
    background: var(--purple-soft);
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 100px;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(32px, 5vw, 60px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin-bottom: 24px;
  }
  h1 .purple {
    color: var(--purple);
    display: inline;
  }

  .hero-lede {
    font-size: 17px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 520px;
  }

  .cta-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 40px; }
  @media (max-width: 480px) {
    .cta-row { gap: 10px; }
    .cta-row .btn { flex: 1 1 100%; justify-content: center; }
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 28px;
    border-radius: 100px;
    font-size: 15px; font-weight: 600;
    text-decoration: none;
    transition: all 0.25s ease;
    cursor: pointer; border: none;
    font-family: inherit;
    min-height: 48px;
  }
  .btn-primary {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 14px rgba(105,56,239,0.3);
  }
  .btn-primary:hover { background: var(--purple-deep); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(105,56,239,0.4); }
  .btn-secondary {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    color: var(--ink);
    border: 1px solid rgba(14,11,44,0.1);
  }
  .btn-secondary:hover { background: #fff; border-color: var(--ink); }

  /* Trust pills row */
  .trust-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  @media (max-width: 700px) { .trust-row { grid-template-columns: 1fr; } }
  .trust-pill {
    background: #fff;
    border-radius: 100px;
    padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
    font-weight: 500;
    font-size: 15px;
    color: var(--ink);
    box-shadow: var(--card-shadow);
  }
  .trust-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--purple-soft);
    color: var(--purple);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }
  .trust-icon.bolt { background: #FFF1D6; color: #D4A017; }

  /* ============ Hero side card (Demo form, redesigned for compliance assessment) ============ */
  .hero-card {
    background: #fff;
    border-radius: 20px;
    padding: 24px 26px;
    box-shadow: var(--card-shadow-lg);
    border: 1px solid rgba(255,255,255,0.6);
    position: relative;
  }
  @media (max-width: 540px) {
    .hero-card { padding: 20px 18px; border-radius: 16px; }
  }
  .hero-card .tag {
    display: inline-block;
    background: var(--purple-soft);
    color: var(--purple);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 5px 10px;
    border-radius: 100px;
    margin-bottom: 10px;
  }

  /* ============ Countdown ticker ============ */
  .ticker {
    background: #0A1024;
    border-radius: 12px;
    padding: 12px 18px 14px;
    margin-bottom: 18px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .ticker::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 0% 0%, rgba(105,56,239,0.18) 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(255,138,76,0.10) 0%, transparent 40%);
    pointer-events: none;
  }
  .ticker-eyebrow {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }
  .ticker-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .ticker-unit {
    text-align: center;
  }
  .ticker-num {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    font-feature-settings: 'tnum';
  }
  .ticker-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  @media (max-width: 540px) {
    .ticker { padding: 10px 14px 12px; }
    .ticker-num { font-size: 22px; }
  }
  .hero-card h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .hero-card p.sub {
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.45;
    margin-bottom: 14px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }
  .form-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .form-field label .req { color: var(--purple); }
  .form-field input, .form-field select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-size: 16px; /* iOS won't zoom on focus when ≥16px */
    font-family: inherit;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.2s;
    min-height: 38px;
  }
  .form-field input:focus, .form-field select:focus {
    outline: none; border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-soft);
  }
  .form-field input::placeholder { color: #B5B2C7; font-size: 14px; }
  .hero-card .btn-primary {
    width: 100%;
    justify-content: center;
    margin-top: 4px;
    padding: 11px;
    font-size: 14px;
