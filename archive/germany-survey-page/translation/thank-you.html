<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrierung erfolgreich | Deutschland E-Invoicing Assessment 2026</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://cdn.prod.website-files.com/63ede4a3da6dbd6b05c4612f/63ede4a3da6dbd7162c46439_32by32.png" />
<link rel="icon" type="image/png" sizes="256x256" href="https://cdn.prod.website-files.com/63ede4a3da6dbd6b05c4612f/63ede4a3da6dbd8997c46450_256by256.png" />
<link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/63ede4a3da6dbd8997c46450_256by256.png" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    /* ClearTax core palette */
    --brand-purple: #301B5E;
    --brand-purple-dark: #1A0B3B;
    --brand-magenta: #D946EF;
    --brand-violet: #6B2BB8;

    /* Pastels */
    --pastel-lavender: #EDEBFA;
    --pastel-peach:    #FDF2ED;
    --pastel-orange:   #F6E0C5;
    --pastel-teal:     #D8EFF2;
    --pastel-mint:     #ECF7ED;
    --pastel-sky:      #EAF4FF;

    --bg: #FFFFFF;
    --bg-soft: #FAFAFC;
    --ink: #1A0B3B;
    --ink-soft: #4A3B6F;
    --muted: #7A7390;
    --border: #E8E5F2;
    --border-strong: #D5CFE5;

    --radius-sm: 8px;
    --radius: 16px;
    --radius-lg: 24px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Gilroy', 'Nohemi', 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 500;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Atmospheric Blobs */
  .hero-atmosphere {
    position: absolute;
    top: -240px; right: -240px;
    width: 760px; height: 760px;
    background:
      radial-gradient(circle at 30% 30%, rgba(217, 70, 239, 0.18), transparent 60%),
      radial-gradient(circle at 70% 60%, rgba(107, 43, 184, 0.16), transparent 65%),
      radial-gradient(circle at 50% 80%, rgba(48, 27, 94, 0.12), transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }

  /* ========== Floating Glass Navbar ========== */
  .nav-wrap {
    position: fixed;
    top: 16px; left: 0; right: 0;
    z-index: 100;
    display: flex; justify-content: center;
    padding: 0 16px;
    pointer-events: none;
  }
  .nav {
    pointer-events: auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px;
    width: 100%; max-width: 1160px;
    padding: 10px 10px 10px 28px;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: var(--radius-pill);
    box-shadow: 0 10px 40px -12px rgba(26, 11, 59, 0.15);
  }
  .logo {
    font-family: 'Nohemi', 'Gilroy', 'Manrope', sans-serif;
    font-weight: 500;
    font-size: 22px; letter-spacing: -0.02em;
    color: var(--ink); text-decoration: none;
  }
  .nav-links {
    display: flex; align-items: center; gap: 28px;
    font-size: 14px; font-weight: 500;
  }
  .nav-links a {
    color: var(--ink-soft); text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--brand-purple); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px;
    background: var(--brand-purple) !important;
    color: #fff !important;
    border-radius: var(--radius-pill);
    font-weight: 500;
    transition: all 0.2s;
  }
  .nav-cta:hover {
    background: var(--brand-purple-dark) !important;
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .nav-links .nav-hide { display: none; }
    .nav { padding: 8px 8px 8px 20px; gap: 12px; }
  }

  /* ========== MAIN CONTAINER ========== */
  main {
    flex-grow: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 180px 24px 80px;
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Glass Card */
  .thank-you-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: var(--radius-lg);
    padding: 60px 48px;
    max-width: 680px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 60px -20px rgba(26, 11, 59, 0.15);
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Premium Checklist Emoji Badge */
  .badge {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 80px;
    height: 80px;
    background: var(--pastel-lavender);
    border-radius: 50%;
    font-size: 38px;
    margin-bottom: 32px;
    position: relative;
  }

  .badge::after {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px dashed var(--brand-violet);
    border-radius: 50%;
    animation: rotate 12s linear infinite;
  }

  @keyframes rotate {
    to { transform: rotate(360deg); }
  }

  .kicker {
    display: block;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brand-violet);
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Nohemi', 'Gilroy', 'Manrope', sans-serif;
    font-weight: 500;
    font-size: clamp(32px, 4.5vw, 48px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    background: linear-gradient(135deg,
      var(--brand-magenta) 0%,
      var(--brand-violet) 45%,
      var(--brand-purple) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  .lead {
    font-size: clamp(16px, 1.6vw, 19px);
    line-height: 1.6;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong) 20%, var(--border-strong) 80%, transparent);
    margin: 32px 0;
  }

  .details {
    font-size: clamp(14px, 1.4vw, 16px);
    line-height: 1.65;
    color: var(--muted);
    font-weight: 500;
    max-width: 560px;
  }

  /* Back Button (Standard pill) */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    background: var(--brand-purple);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-pill);
    box-shadow: 0 8px 20px -6px rgba(48, 27, 94, 0.4);
    transition: all 0.2s ease-in-out;
  }

  .back-btn:hover {
    background: var(--brand-purple-dark);
    transform: translateY(-1px);
    box-shadow: 0 12px 28px -8px rgba(48, 27, 94, 0.5);
  }

  .back-btn .arrow {
    transition: transform 0.2s;
  }

  .back-btn:hover .arrow {
    transform: translateX(4px);
  }

  /* Grid details showing metadata / email if present */
  .user-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    color: var(--ink-soft);
  }
  .user-badge svg {
    color: var(--brand-violet);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .thank-you-card {
      padding: 40px 24px;
      border-radius: var(--radius);
    }
  }

  /* ========== FOOTER ========== */
  footer {
    background: var(--brand-purple-dark);
    color: #C7BFE0;
    padding: 64px 32px 32px;
    position: relative;
    overflow: hidden;
    margin-top: auto;
  }
  footer::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(217, 70, 239, 0.15), transparent 70%);
    pointer-events: none;
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto;
    position: relative;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 40px;
    padding-bottom: 40px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  .footer-brand .logo { color: #fff; }
  .footer-brand p {
    color: #948BAD;
    font-size: 14px;
    margin-top: 14px;
    max-width: 280px;
    font-weight: 500;
  }
  .footer-col h4 {
    font-size: 12px; letter-spacing: 0.10em; text-transform: uppercase;
    color: #fff; margin-bottom: 18px; font-weight: 600;
  }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 12px; }
  .footer-col a {
    color: #C7BFE0;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .footer-col a:hover { color: #fff; }
  .footer-bottom {
    padding-top: 24px;
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 16px;
    font-size: 13px; color: #948BAD;
    font-weight: 500;
  }
  .socials { display: inline-flex; gap: 10px; }
  .socials a {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: grid; place-items: center;
    color: #fff;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .socials a:hover {
    background: var(--brand-magenta);
    border-color: transparent;
  }
  @media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) {
    .footer-grid { grid-template-columns: 1fr; }
    footer { padding: 48px 20px 24px; }
  }
</style>
</head>
<body>

<!-- Atmosphere blob -->
<div class="hero-atmosphere"></div>

<!-- MAIN THANK YOU CARD -->
<main>
  <div class="thank-you-card">
    <div class="badge">
      <span>🎉</span>
    </div>
    
    <span class="kicker">Thank you — your request has been received.</span>
    <h1>You’re All Set</h1>
    
    <p class="lead">
      One of our compliance experts will reach out to you shortly with tailored guidance for your compliance and e-invoicing needs.
    </p>

    <div id="email-badge-wrap" style="display: none;">
      <div class="user-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        <span id="user-email"></span>
      </div>
    </div>

  </div>
</main>

<script>
  // Dynamically show the registered email address if passed as parameter
  (function() {
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (email) {
      const emailEl = document.getElementById('user-email');
      const badgeWrap = document.getElementById('email-badge-wrap');
      if (emailEl && badgeWrap) {
        emailEl.textContent = decodeURIComponent(email);
        badgeWrap.style.display = 'block';
      }
    }
  })();
</script>

</body>
</html>
