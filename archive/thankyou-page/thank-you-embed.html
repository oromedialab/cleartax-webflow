
<style>
  /* Reset wrapper so it owns the viewport */
  .ty-wrap * { box-sizing: border-box; }

  .ty-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #FFFFFF;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .ty-card {
    text-align: center;
    max-width: 520px;
    width: 100%;
    margin-bottom: 50px;
  }

  .ty-icon {
    position: relative;
    width: 144px;
    height: 144px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: ty-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .ty-check {
    width: 100%;
    height: 100%;
    display: block;
    position: relative;
    z-index: 1;
  }

  /* Animated stroke draw-in */
  .ty-check path {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: ty-draw 0.7s 0.35s ease-out forwards;
  }

  .ty-title {
    font-size: 36px;
    line-height: 1.2;
    font-weight: 700;
    color: #1A1A2E;
    margin: 0 0 12px;
    opacity: 0;
    animation: ty-rise 0.6s 0.55s ease-out forwards;
  }

  .ty-subtitle {
    font-size: 18px;
    line-height: 1.55;
    color: #6B7280;
    max-width: 28rem;
    margin: 0 auto;
    opacity: 0;
    animation: ty-rise 0.6s 0.75s ease-out forwards;
  }

  .ty-cta {
    display: inline-block;
    margin-top: 32px;
    padding: 12px 28px;
    background: #483C71;
    color: #FFFFFF;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 100px;
    opacity: 0;
    animation: ty-rise 0.6s 0.95s ease-out forwards;
    transition: background-color 0.2s ease;
  }
  .ty-cta:hover { background: #5A4D8A; }

  /* ── Animations ─────────────────────────────────────── */
  @keyframes ty-pop {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes ty-draw {
    to { stroke-dashoffset: 0; }
  }

  @keyframes ty-rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ─────────────────────────────────────── */
  @media (max-width: 640px) {
    .ty-icon     { width: 96px; height: 96px; margin-bottom: 16px; }
    .ty-title    { font-size: 24px; }
    .ty-subtitle { font-size: 14px; }
    .ty-wrap     { padding: 48px 24px; }
    .ty-cta      { font-size: 14px; padding: 10px 22px; margin-top: 24px; }
  }

  /* Respect users who don't want motion */
  @media (prefers-reduced-motion: reduce) {
    .ty-icon,
    .ty-check path,
    .ty-title,
    .ty-subtitle,
    .ty-cta {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }
</style>

<div class="ty-wrap">
  <div class="ty-card">
    <div class="ty-icon">
      <svg class="ty-check" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 6L9 17l-5-5" stroke="#483C71" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="ty-title">Thank you for your response</h1>
    <p class="ty-subtitle">Our expert will get in touch with you shortly.</p>
    <a class="ty-cta" href="https://www.cleartax.com/electronic-invoicing">Back</a>
  </div>
</div>
