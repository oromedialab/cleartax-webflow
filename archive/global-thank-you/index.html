<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Thank You Page</title>

    <meta content="noindex, nofollow" name="robots" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <style>
        .ct-ty-page {
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .ct-ty-bg-wash {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(49, 34, 86, 0.07) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .ct-ty-bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(49, 34, 86, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(49, 34, 86, 0.05) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
        }

        .ct-ty-card {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border: 1px solid rgba(49, 34, 86, 0.12);
            border-radius: 20px;
            padding: 2.75rem 3rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(49, 34, 86, 0.08);
        }

        .ct-ty-logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.25rem;
        }

        .ct-ty-logo-row img {
            height: 28px;
            width: auto;
        }

        .ct-ty-check-outer {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 1.5px solid rgba(64, 44, 95, 0.25);
            background: rgba(49, 34, 86, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
        }

        .ct-ty-check-inner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(17, 0, 114, 0.1), rgba(122, 86, 152, 0.15));
            border: 1px solid rgba(64, 44, 95, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ct-ty-check-inner svg {
            width: 22px;
            height: 22px;
            stroke: #402C5F;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ct-ty-headline {
            font-size: 21px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.35;
            letter-spacing: -0.4px;
            margin-bottom: 0.85rem;
        }

        .ct-ty-subtext {
            font-size: 14.5px;
            color: #6b6b80;
            line-height: 1.75;
            max-width: 390px;
            margin: 0 auto 2rem;
        }

        .ct-ty-subtext strong {
            color: #312256;
            font-weight: 500;
        }

        .ct-ty-sep {
            height: 1px;
            background: rgba(49, 34, 86, 0.08);
            margin: 0 0 1.75rem;
        }

        .ct-ty-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #110072, #7A5698);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.1px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .ct-ty-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .ct-ty-btn svg {
            width: 15px;
            height: 15px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ct-ty-footer {
            margin-top: 1.5rem;
            font-size: 11.5px;
            color: #b0afc0;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P5NDQXGH"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="ct-ty-page">
        <div class="ct-ty-bg-wash"></div>
        <div class="ct-ty-bg-grid"></div>
        <div class="ct-ty-card">
            <div class="ct-ty-logo-row">
                <img alt="ClearTax"
                    src="https://cdn.prod.website-files.com/6093bce33d9b4bae841b04e3/69dfcff6071b983201f5f097_logo-cleartax.svg" />
            </div>
            <div class="ct-ty-check-outer">
                <div class="ct-ty-check-inner">
                    <svg viewbox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>
            <h1 class="ct-ty-headline">Thank you — your request<br />has been received.</h1>
            <p class="ct-ty-subtext">
                One of our <strong>compliance experts</strong> will reach out to you shortly with <strong>tailored
                    guidance</strong> for your compliance and e-invoicing needs.
            </p>
            <div class="ct-ty-sep"></div>
            <a class="ct-ty-btn" href="https://cleartax.com">
                <svg viewbox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Explore ClearTax
            </a>
            <p class="ct-ty-footer">© 2026 ClearTax · Trusted by 5000+ global enterprises</p>
        </div>
    </div>
</body>

</html>
